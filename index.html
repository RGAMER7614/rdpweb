<!DOCTYPE html>
<html>
<head>
    <title>Premium RDP Gen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d1117; color: white; text-align: center; padding-top: 80px; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 12px; }
        #res { display: none; background: rgba(35, 134, 54, 0.1); border: 1px dashed #238636; padding: 15px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="box col-md-5 mx-auto shadow">
            <h3>🚀 RDP Generator 2026</h3>
            <input type="password" id="gh" class="form-control my-3 bg-dark text-white border-secondary" placeholder="GitHub Token">
            <input type="password" id="ng" class="form-control my-3 bg-dark text-white border-secondary" placeholder="Ngrok Authtoken">
            <button onclick="start()" id="btn" class="btn btn-primary w-100">GENERATE</button>
            
            <div id="loader" class="mt-3" style="display:none;">
                <div class="spinner-border text-primary border-3"></div>
                <p>গিটহাব কম্পিউটারটি চালু করছে... ২ মিনিট অপেক্ষা করুন।</p>
            </div>

            <div id="res" class="text-start">
                <p class="text-success text-center">✅ <b>RDP ONLINE!</b></p>
                <p><b>IP:</b> <code id="ip" class="text-info">Fetching...</code></p>
                <p><b>User:</b> <code>runneradmin</code></p>
                <p><b>Pass:</b> <code>FreeRDP@2026</code></p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "3ANdpm8dNsGQz6X98ryqfGVpHZG_7rFyfFv8ro6cjRRebKR7o";
        async function start() {
            const token = document.getElementById('gh').value;
            const ngrok = document.getElementById('ng').value;
            if(!token || !ngrok) return alert("Fill all boxes!");

            document.getElementById('btn').disabled = true;
            document.getElementById('loader').style.display = 'block';

            const res = await fetch('/.netlify/functions/generate', {
                method: 'POST',
                body: JSON.stringify({ token, ngrok })
            });
            const data = await res.json();
            if(data.success) checkIP();
            else { alert("Error: " + data.error); location.reload(); }
        }

        async function checkIP() {
            const res = await fetch('https://api.ngrok.com/tunnels', {
                headers: { 'Authorization': `Bearer ${API_KEY}`, 'Ngrok-Version': '2' }
            });
            const d = await res.json();
            if(d.tunnels && d.tunnels.length > 0) {
                document.getElementById('ip').innerText = d.tunnels[0].public_url.replace("tcp://", "");
                document.getElementById('loader').style.display = 'none';
                document.getElementById('res').style.display = 'block';
            } else {
                setTimeout(checkIP, 15000);
            }
        }
    </script>
</body>
</html>
