<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a2e; color: white; padding-top: 50px; text-align: center; font-family: sans-serif; }
        .box { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .res { display: none; background: rgba(0, 255, 127, 0.1); border: 1px dashed #00ff7f; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; }
        code { color: #00d2ff; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="box col-md-6 mx-auto">
            <h3>🚀 RDP Session Generator</h3>
            <p class="small text-secondary">গিটহাব টোকেন ও এনগ্রোক টোকেন দিন</p>
            <input type="password" id="gh" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="GitHub Token (ghp_xxx)">
            <input type="password" id="ng" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Ngrok Authtoken">
            <button onclick="start()" id="btn" class="btn btn-primary w-100">GENERATE</button>
            
            <div id="load" class="mt-3" style="display:none;">
                <div class="spinner-border text-info"></div>
                <p id="msg">প্রসেস শুরু হয়েছে... ২ মিনিট অপেক্ষা করুন।</p>
            </div>

            <div id="res" class="res">
                <h6 class="text-success text-center">✅ RDP IS ONLINE!</h6>
                <p><b>IP:</b> <code id="ip">Fetching...</code></p>
                <p><b>User:</b> <code>runneradmin</code></p>
                <p><b>Pass:</b> <code>FreeRDP@2026</code></p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "3ANdpm8dNsGQz6X98ryqfGVpHZG_7rFyfFv8ro6cjRRebKR7o";

        async function start() {
            const token = document.getElementById('gh').value;
            const ngrok = document.getElementById('ng').value;
            if(!token || !ngrok) return alert("সবগুলো বক্স পূরণ করুন!");

            document.getElementById('btn').disabled = true;
            document.getElementById('load').style.display = 'block';

            try {
                const res = await fetch('/.netlify/functions/generate', {
                    method: 'POST',
                    body: JSON.stringify({ token, ngrok })
                });
                const data = await res.json();

                if(data.success) {
                    document.getElementById('msg').innerText = "GitHub Actions চালু হয়েছে। আইপি খোঁজা হচ্ছে...";
                    checkIP();
                } else {
                    alert("Error: " + data.error);
                    location.reload();
                }
            } catch(e) { alert("Server Error!"); }
        }

        async function checkIP() {
            try {
                const res = await fetch('https://api.ngrok.com/tunnels', {
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Ngrok-Version': '2' }
                });
                const d = await res.json();
                if(d.tunnels && d.tunnels.length > 0) {
                    document.getElementById('ip').innerText = d.tunnels[0].public_url.replace("tcp://", "");
                    document.getElementById('load').style.display = 'none';
                    document.getElementById('res').style.display = 'block';
                } else {
                    setTimeout(checkIP, 20000); // ২০ সেকেন্ড পর আবার চেক
                }
            } catch(e) { setTimeout(checkIP, 20000); }
        }
    </script>
</body>
</html>
