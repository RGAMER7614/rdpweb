<!DOCTYPE html>
<html>
<head>
    <title>Auto RDP Creator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d1117; color: white; padding-top: 100px; text-align: center; }
        .main-box { background: #161b22; border: 1px solid #30363d; padding: 40px; border-radius: 15px; }
        .status-box { display: none; margin-top: 20px; padding: 15px; border-radius: 8px; background: #23863622; border: 1px dashed #238636; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-box col-md-6 mx-auto shadow-lg">
            <h2>🚀 Auto RDP Generator</h2>
            <p class="text-secondary">শুধু আপনার GitHub Token দিন</p>
            
            <input type="password" id="token" class="form-control my-4 bg-dark text-white border-secondary" placeholder="ghp_xxxxxxxxxxxx">
            <button onclick="createRDP()" id="genBtn" class="btn btn-primary btn-lg w-100">CREATE RDP</button>

            <div id="loader" class="mt-4" style="display:none;">
                <div class="spinner-border text-info"></div>
                <p>গিটহাব সার্ভার তৈরি হচ্ছে... ২ মিনিট সময় লাগবে।</p>
            </div>

            <div id="result" class="status-box text-start">
                <h5 class="text-success text-center">✅ RDP CREATED!</h5>
                <hr>
                <p><b>IP Address:</b> <code id="rdpIp" class="text-info">Fetching...</code></p>
                <p><b>Username:</b> <code>runneradmin</code></p>
                <p><b>Password:</b> <code>FreeRDP@2026</code></p>
            </div>
        </div>
    </div>

    <script>
        // আপনার Ngrok API Key এখানে দিন আইপি অটো-ফেচ করার জন্য
        const NGROK_API_KEY = "3ANdpm8dNsGQz6X98ryqfGVpHZG_7rFyfFv8ro6cjRRebKR7o";

        async function createRDP() {
            const token = document.getElementById('token').value;
            if(!token) return alert("Please enter GitHub Token!");

            document.getElementById('genBtn').disabled = true;
            document.getElementById('loader').style.display = 'block';

            try {
                const response = await fetch('/.netlify/functions/generate', {
                    method: 'POST',
                    body: JSON.stringify({ token })
                });
                const data = await response.json();

                if(data.success) {
                    fetchIP();
                } else {
                    alert("Error: " + data.error);
                    location.reload();
                }
            } catch (e) { alert("Server error!"); }
        }

        async function fetchIP() {
            try {
                const res = await fetch('https://api.ngrok.com/tunnels', {
                    headers: { 'Authorization': `Bearer ${NGROK_API_KEY}`, 'Ngrok-Version': '2' }
                });
                const data = await res.json();
                if(data.tunnels && data.tunnels.length > 0) {
                    document.getElementById('rdpIp').innerText = data.tunnels[0].public_url.replace("tcp://", "");
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('result').style.display = 'block';
                } else {
                    setTimeout(fetchIP, 15000); // ১৫ সেকেন্ড পর পর আইপি চেক করবে
                }
            } catch (e) { setTimeout(fetchIP, 15000); }
        }
    </script>
</body>
</html>
