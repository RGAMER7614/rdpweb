<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium RDP Gen 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0c29; color: white; font-family: sans-serif; padding-top: 50px; text-align: center; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .result-box { background: rgba(0, 255, 127, 0.1); border: 1px dashed #00ff7f; border-radius: 10px; padding: 20px; margin-top: 25px; display: none; text-align: left; }
        code { color: #ff00c8; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass col-md-6 mx-auto">
            <h2>🚀 RDP Generator</h2>
            <input type="password" id="ghToken" class="form-control mb-3 bg-dark text-white" placeholder="GitHub Token (ghp_xxx)">
            <input type="password" id="ngToken" class="form-control mb-3 bg-dark text-white" placeholder="Ngrok Authtoken">
            <button onclick="start()" id="btn" class="btn btn-primary w-100">GENERATE NOW</button>
            
            <div id="loader" class="mt-3" style="display:none;">
                <div class="spinner-border text-info"></div>
                <p id="msg">বুট হচ্ছে... ২ মিনিট অপেক্ষা করো।</p>
            </div>

            <div id="result" class="result-box">
                <h5 class="text-center text-success">✅ RDP READY!</h5>
                <p><b>IP:</b> <code id="ip">Fetching...</code></p>
                <p><b>User:</b> <code>runneradmin</code></p>
                <p><b>Pass:</b> <code>FreeRDP@2026</code></p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "3ANdpm8dNsGQz6X98ryqfGVpHZG_7rFyfFv8ro6cjRRebKR7o";

        async function start() {
            const token = document.getElementById('ghToken').value;
            const ngrok = document.getElementById('ngToken').value;
            if(!token || !ngrok) return alert("Fill all boxes!");

            document.getElementById('btn').disabled = true;
            document.getElementById('loader').style.display = 'block';

            const res = await fetch('/.netlify/functions/generate', {
                method: 'POST',
                body: JSON.stringify({ token, ngrok })
            });
            const data = await res.json();

            if(data.success) {
                document.getElementById('msg').innerText = "GitHub Action চালু হয়েছে। আইপি খোঁজা হচ্ছে...";
                checkIP();
            } else {
                alert("Error: " + data.error);
                location.reload();
            }
        }

        async function checkIP() {
            try {
                const res = await fetch('https://api.ngrok.com/tunnels', {
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Ngrok-Version': '2' }
                });
                const data = await res.json();
                if(data.tunnels && data.tunnels.length > 0) {
                    document.getElementById('ip').innerText = data.tunnels[0].public_url.replace("tcp://", "");
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('result').style.display = 'block';
                } else {
                    setTimeout(checkIP, 20000); // ২০ সেকেন্ড পর আবার চেক
                }
            } catch(e) { setTimeout(checkIP, 20000); }
        }
    </script>
</body>
</html>
